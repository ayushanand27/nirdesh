# Render Blueprint for Nirdesh (free Hobby tier).
# Deploys a FastAPI backend (Web Service) and a React static site.
#
# After the first deploy, set these in the Render dashboard (never commit them):
#   backend  -> GROQ_API_KEY        = <your Groq key>
#   backend  -> ALLOWED_ORIGINS     = https://<frontend>.onrender.com
#   frontend -> VITE_API_BASE_URL   = https://<backend>.onrender.com
#
# Note: the free tier disk is ephemeral and the service sleeps after inactivity.
# The backend reseeds its demo DB automatically on every cold start.

services:
  - type: web
    name: nirdesh-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: nirdesh-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # SPA + API proxy niceties
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
